version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rh-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/dump.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - rh-network

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

    # Bind to localhost only - not exposed to internet
    ports:
      - "127.0.0.1:5432:5432"

  # Spring Boot Backend
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile

    container_name: rh-backend
    restart: unless-stopped

    environment:
      # Load from .env file
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      BREVO_API_KEY: ${BREVO_API_KEY}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY_PATH: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY_PATH}
      GOOGLE_DRIVE_CLIENT_VIEWER_KEY_PATH: ${GOOGLE_DRIVE_CLIENT_VIEWER_KEY_PATH}
      GOOGLE_DRIVE_PARENT_FOLDER_ID: ${GOOGLE_DRIVE_PARENT_FOLDER_ID}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI}

    volumes:
      # Upload directory for persistence
      - uploads:/app/uploads
      # Logs directory
      - logs:/app/logs
      # Tokens directory for Google Drive
      - tokens:/app/tokens
      # Optional: Mount Google Drive service account keys if they exist
      - ./secrets/service-account.json:/app/service-account.json:ro
      - ./secrets/client-viewer-service-account.json:/app/client-viewer-service-account.json:ro
    ports:
      # Expose backend only on localhost - Nginx will proxy it
      - "127.0.0.1:8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - rh-network

    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:8080/actuator/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
  tokens:
    driver: local

networks:
  rh-network:
    driver: bridge
