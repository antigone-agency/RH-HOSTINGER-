upstream rh_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    
    server_name 2.24.15.95 _;
    
    # Redirect HTTP to HTTPS (enable after HTTPS is configured)
    # return 301 https://$server_name$request_uri;
    
    client_max_body_size 20M;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
    gzip_min_length 1000;
    
    # Root redirect to /rh/
    location = / {
        return 302 /rh/;
    }
    
    # RH Frontend
    location = /rh {
        return 301 /rh/;
    }
    
    location /rh/ {
        alias /var/www/rh/;
        
        # Serve index.html for all routes (SPA routing)
        try_files $uri $uri/ /rh/index.html;
        
        # Cache policy for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Don't cache index.html
        location = /rh/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    
    # Projects Frontend
    location = /projects {
        return 301 /projects/;
    }
    
    location /projects/ {
        alias /var/www/projects/;
        
        # Serve index.html for all routes (SPA routing)
        try_files $uri $uri/ /projects/index.html;
        
        # Cache policy for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Don't cache index.html
        location = /projects/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    
    # Backend API Proxy
    location /api/ {
        proxy_pass http://rh_backend/api/;
        
        proxy_http_version 1.1;
        
        # Headers for proper proxy behavior
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Disable proxy redirect (let frontend handle redirects)
        proxy_redirect off;
    }
    
    # Health check endpoint for monitoring
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security headers
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

