services:
  - type: web
    name: antigone-rh-backend
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY_B64
        sync: false
      - key: GOOGLE_DRIVE_VIEWER_KEY_B64
        sync: false
      - key: GOOGLE_DRIVE_PARENT_FOLDER_ID
        sync: false

databases:
  - name: antigone-rh-db
    plan: free
    databaseName: antigone_rh
    postgresMajorVersion: 16
